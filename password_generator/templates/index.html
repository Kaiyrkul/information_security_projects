<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Password Generator</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/app.css') }}"
    />
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>Password Generator</h1>
        <p>Cryptographically secure randomness on the server side (`secrets`)</p>
      </header>

      <main class="card">
        <div class="field">
          <label class="primary" for="length-num">Length</label>
          <div class="length-row">
            <input
              type="range"
              id="length-range"
              min="1"
              max="{{ max_length }}"
              value="16"
              aria-label="Password length"
            />
            <input
              type="number"
              id="length-num"
              min="1"
              max="{{ max_length }}"
              value="16"
              aria-describedby="length-hint"
            />
          </div>
          <span id="length-hint" class="entropy" style="margin-top: 0.35rem; display: block"
            >from 1 to {{ max_length }} characters</span
          >
        </div>

        <div class="field">
          <span class="primary">Character sets</span>
          <div class="sets" role="group" aria-label="Character sets">
            <label class="set-item">
              <input type="checkbox" id="set-lower" checked />
              <span>Lowercase Latin letters (a–z)</span>
            </label>
            <label class="set-item">
              <input type="checkbox" id="set-upper" checked />
              <span>Uppercase Latin letters (A–Z)</span>
            </label>
            <label class="set-item">
              <input type="checkbox" id="set-digits" checked />
              <span>Digits (0–9)</span>
            </label>
            <label class="set-item">
              <input type="checkbox" id="set-symbols" checked />
              <span>Symbols</span>
            </label>
          </div>
        </div>

        <button type="button" class="btn" id="btn-gen">Generate</button>

        <div class="alert" id="alert" hidden role="alert"></div>

        <section class="out" id="out" hidden>
          <div class="pwd-row">
            <div class="pwd-box" id="pwd-text" aria-live="polite"></div>
            <button type="button" class="btn-copy" id="btn-copy">Copy</button>
          </div>
          <div class="meta">
            <span class="badge" id="status-badge"></span>
            <span class="entropy"
              >Entropy: <strong id="entropy-val">—</strong> bits</span
            >
          </div>
        </section>
      </main>

      <footer>JSON API: <code>/generate</code></footer>
    </div>

    <script>
      (function () {
        const maxLen = {{ max_length }};
        const range = document.getElementById("length-range");
        const num = document.getElementById("length-num");
        const sets = {
          lower: document.getElementById("set-lower"),
          upper: document.getElementById("set-upper"),
          digits: document.getElementById("set-digits"),
          symbols: document.getElementById("set-symbols"),
        };
        const btnGen = document.getElementById("btn-gen");
        const btnCopy = document.getElementById("btn-copy");
        const alertEl = document.getElementById("alert");
        const out = document.getElementById("out");
        const pwdText = document.getElementById("pwd-text");
        const statusBadge = document.getElementById("status-badge");
        const entropyVal = document.getElementById("entropy-val");

        const statusLabels = {
          Weak: "Weak",
          Medium: "Medium",
          Secure: "Secure",
        };
        const statusClass = {
          Weak: "weak",
          Medium: "medium",
          Secure: "secure",
        };

        function syncRangeFromNum() {
          let v = parseInt(num.value, 10);
          if (Number.isNaN(v)) v = 1;
          v = Math.min(maxLen, Math.max(1, v));
          num.value = v;
          range.value = v;
        }

        function syncNumFromRange() {
          num.value = range.value;
        }

        range.addEventListener("input", syncNumFromRange);
        num.addEventListener("input", syncRangeFromNum);
        num.addEventListener("blur", syncRangeFromNum);

        function buildQuery() {
          const params = new URLSearchParams();
          params.set("length", num.value);
          if (!sets.lower.checked) params.set("no_lower", "1");
          if (!sets.upper.checked) params.set("no_upper", "1");
          if (!sets.digits.checked) params.set("no_digits", "1");
          if (!sets.symbols.checked) params.set("no_symbols", "1");
          return params.toString();
        }

        function showError(msg) {
          alertEl.textContent = msg;
          alertEl.hidden = false;
        }

        function hideError() {
          alertEl.hidden = true;
          alertEl.textContent = "";
        }

        btnGen.addEventListener("click", async function () {
          hideError();
          syncRangeFromNum();

          if (
            !sets.lower.checked &&
            !sets.upper.checked &&
            !sets.digits.checked &&
            !sets.symbols.checked
          ) {
            showError("Select at least one character set.");
            return;
          }

          btnGen.disabled = true;
          try {
            const res = await fetch("/generate?" + buildQuery(), {
              headers: { Accept: "application/json" },
            });
            const data = await res.json().catch(function () {
              return {};
            });

            if (!res.ok) {
              showError(data.error || "Server error (" + res.status + ")");
              out.hidden = true;
              return;
            }

            pwdText.textContent = data.password;
            entropyVal.textContent = data.entropy;
            const st = data.status || "";
            statusBadge.textContent = statusLabels[st] || st;
            statusBadge.className = "badge " + (statusClass[st] || "");
            out.hidden = false;
          } catch (e) {
            showError("Could not reach server. Is the application running?");
            out.hidden = true;
          } finally {
            btnGen.disabled = false;
          }
        });

        btnCopy.addEventListener("click", async function () {
          const t = pwdText.textContent;
          if (!t) return;
          try {
            await navigator.clipboard.writeText(t);
            btnCopy.textContent = "Copied";
            setTimeout(function () {
              btnCopy.textContent = "Copy";
            }, 1500);
          } catch (e) {
            btnCopy.textContent = "Error";
            setTimeout(function () {
              btnCopy.textContent = "Copy";
            }, 1500);
          }
        });
      })();
    </script>
  </body>
</html>
