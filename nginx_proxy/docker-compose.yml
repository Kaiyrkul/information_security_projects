services:
  generator:
    build: ../password_generator
    ports:
      - "5000:5000"
    networks:
      - app

  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - generator
    networks:
      - app

networks:
  app:
    driver: bridge
